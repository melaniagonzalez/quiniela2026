<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&amp;family=Outfit:wght@800;900&amp;display=swap');
      .dark-bg { fill: #070707; }
      .brand-title { font-family: 'Outfit', 'Inter', sans-serif; font-weight: 900; font-size: 78px; letter-spacing: -2px; }
      .brand-subtitle { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 32px; fill: #A1A1AA; letter-spacing: 2px; }
      .text-white { fill: #FFFFFF; }
      .text-cyan { fill: #00F5D4; }
      .text-purple { fill: #8B5CF6; }
    </style>
    <!-- Background watermark grid of pg curves -->
    <pattern id="grid-pattern" width="160" height="160" patternUnits="userSpaceOnUse">
      <path d="M 40,0 Q 80,40 40,80 T 40,160" fill="none" stroke="#1F1F24" stroke-width="1.5" opacity="0.3"/>
      <path d="M 120,0 Q 80,40 120,80 T 120,160" fill="none" stroke="#1F1F24" stroke-width="1.5" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Base background -->
  <rect width="1000" height="300" class="dark-bg" />
  
  <!-- Watermark grid -->
  <rect width="1000" height="300" fill="url(#grid-pattern)" />
  
  <!-- Content Group -->
  <g transform="translate(80, 110)">
    <!-- brand-title: pgsimple -->
    <text class="brand-title">
      <tspan class="text-white">pg</tspan><tspan class="text-cyan">s</tspan><tspan class="text-purple">imple</tspan>
    </text>
    
    <!-- External Link Arrow Box Icon -->
    <g transform="translate(390, -58) scale(1.35)" stroke="#FFFFFF" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="15" width="28" height="28" rx="2" stroke-width="4.5" />
      <path d="M 20,4 L 36,4 L 36,20" stroke-width="4.5" stroke-linecap="square" />
      <line x1="20" y1="20" x2="35" y2="5" stroke-width="4.5" />
      <rect x="0" y="8" width="18" height="18" fill="#070707" stroke="none" />
      <path d="M 18,15 L 18,33 L 5,33 L 5,15 L 18,15" stroke-width="4.5" />
    </g>
    
    <!-- Subtitle: Tu página web, simple -->
    <text y="70" class="brand-subtitle">Tu página web, simple</text>
  </g>
  
  <!-- Right Graphic Monogram pg -->
  <g transform="translate(680, 0)">
    <!-- Right background vertical colors -->
    <rect x="50" width="130" height="300" fill="#8B5CF6" />
    <rect x="-10" width="60" height="300" fill="#00F5D4" />
    <path d="M 50,0 L 50,300 L -10,300 Z" fill="#84CC16" />
    
    <!-- Masking "pg" shape cutouts in background color -->
    <g fill="#070707">
      <circle cx="50" cy="85" r="55" stroke="#070707" stroke-width="35" fill="none" />
      <circle cx="50" cy="210" r="55" stroke="#070707" stroke-width="35" fill="none" />
      <rect x="15" y="30" width="35" height="230" />
      <rect x="85" y="140" width="35" height="115" />
    </g>
  </g>
</svg>
